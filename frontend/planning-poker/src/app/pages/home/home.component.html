<div class="home-container">
  <div class="hero">
    <mat-icon class="hero-icon">style</mat-icon>
  </div>

  <mat-card class="action-card">
    <mat-tab-group dynamicHeight>
      <!-- Create Room Tab -->
      <mat-tab label="Create Room">
        <div class="tab-content">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Your Name</mat-label>
            <input matInput [(ngModel)]="playerName" placeholder="Enter your name" (keyup.enter)="createRoom()">
            <mat-icon matPrefix>person</mat-icon>
          </mat-form-field>

          <button mat-raised-button color="primary" class="full-width action-btn" (click)="createRoom()"
            [disabled]="!playerName.trim()">
            <mat-icon>add_circle</mat-icon>
            Create Room
          </button>
        </div>
      </mat-tab>

      <!-- Join Room Tab -->
      <mat-tab label="Join Room">
        <div class="tab-content">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Your Name</mat-label>
            <input matInput [(ngModel)]="playerName" placeholder="Enter your name">
            <mat-icon matPrefix>person</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Room ID</mat-label>
            <input matInput [(ngModel)]="roomId" placeholder="e.g. A1B2C3" (keyup.enter)="joinRoom()"
              style="text-transform: uppercase;">
            <mat-icon matPrefix>vpn_key</mat-icon>
          </mat-form-field>

          @if (errorMessage()) {
          <p class="error-message">{{ errorMessage() }}</p>
          }

          <button mat-raised-button color="primary" class="full-width action-btn" (click)="joinRoom()"
            [disabled]="!playerName.trim() || !roomId.trim()">
            <mat-icon>login</mat-icon>
            Join Room
          </button>
        </div>
      </mat-tab>
    </mat-tab-group>
  </mat-card>

  @if (storedRooms().length > 0) {
  <mat-card class="rooms-card">
    <h3>Your rooms</h3>
    <ul class="rooms-list">
      @for (id of storedRooms(); track id) {
      <li class="room-row">
        <a [routerLink]="['/room', id]" class="room-link">
          <mat-icon>meeting_room</mat-icon>
          <span class="room-id">{{ id }}</span>
        </a>
        <button mat-icon-button (click)="forgetRoom(id)" matTooltip="Forget this room"
          aria-label="Forget this room">
          <mat-icon>close</mat-icon>
        </button>
      </li>
      }
    </ul>
  </mat-card>
  }
</div>
